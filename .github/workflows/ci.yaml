name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format
        id: fmt
        run: bun run fmt:check
        continue-on-error: true

      - name: Lint
        id: lint
        run: bun run lint
        continue-on-error: true

      - name: Typecheck
        id: typecheck
        run: bun run typecheck
        continue-on-error: true

      - name: Test
        id: test
        run: bun run test:coverage
        continue-on-error: true

      - name: Build
        id: build
        run: bun run build
        continue-on-error: true

      - name: Results
        if: always()
        run: |
          results="${{ steps.fmt.outcome }} ${{ steps.lint.outcome }} ${{ steps.typecheck.outcome }} ${{ steps.test.outcome }} ${{ steps.build.outcome }}"
          if [[ "$results" == *"failure"* ]]; then exit 1; fi
